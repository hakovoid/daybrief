name: DayBrief Newsletter

# Copy this workflow to your own repository and configure the secrets.
# This is a template — adjust the cron schedule to your needs.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Every Monday at 7:00 UTC

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download DayBrief
        run: |
          LATEST=$(curl -s https://api.github.com/repos/yoanbernabeu/daybrief/releases/latest | grep browser_download_url | grep linux-amd64 | cut -d '"' -f 4)
          curl -sL "$LATEST" -o daybrief
          chmod +x daybrief

      - name: Run DayBrief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_EMAIL: ${{ secrets.MAIL_FROM_EMAIL }}
          DAYBRIEF_RECIPIENTS: ${{ secrets.DAYBRIEF_RECIPIENTS }}
        run: ./daybrief run --config config.yaml

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: add newsletter $(date +%Y-%m-%d)"
          git push
